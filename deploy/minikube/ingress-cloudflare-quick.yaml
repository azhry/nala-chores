apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: runner-manager-cloudflare-quick
  namespace: agent-runner
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: runner-manager
                port:
                  name: http
