apiVersion: v1
kind: ServiceAccount
metadata:
  name: runner-manager
  namespace: agent-runner
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: runner-manager
  namespace: agent-runner
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete", "patch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "list", "watch", "patch", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: runner-manager
  namespace: agent-runner
subjects:
  - kind: ServiceAccount
    name: runner-manager
    namespace: agent-runner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: runner-manager
