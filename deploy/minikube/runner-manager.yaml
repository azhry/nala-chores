apiVersion: apps/v1
kind: Deployment
metadata:
  name: runner-manager
  namespace: agent-runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opencode-agent-runner
      app.kubernetes.io/component: manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opencode-agent-runner
        app.kubernetes.io/component: manager
    spec:
      serviceAccountName: runner-manager
      containers:
        - name: manager
          image: opencode-runner-manager:kilocode-v8
          imagePullPolicy: IfNotPresent
          env:
            - name: RUNNER_MANAGER_ADDR
              value: ":8080"
            - name: RUNNER_NAMESPACE
              value: agent-runner
            - name: RUNNER_BACKEND_IMAGE
              value: opencode-runner-backend:kilocode-v8
            - name: RUNNER_SECRET_NAME
              value: runner-secrets
            - name: RUNNER_APPLY_JOBS
              value: "true"
            - name: RUNNER_STATE_PATH
              value: /data/state.json
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          volumeMounts:
            - name: state
              mountPath: /data
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: runner-manager-state
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: runner-manager-state
  namespace: agent-runner
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: runner-manager
  namespace: agent-runner
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: opencode-agent-runner
    app.kubernetes.io/component: manager
  ports:
    - name: http
      port: 8080
      targetPort: http
